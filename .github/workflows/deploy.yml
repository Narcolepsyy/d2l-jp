name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # Match the original d2l-ai Docker image (Dockerfile.d2l-builder):
      # d2lbook==1.0.0 + torch (CPU-only for CI)
      - name: Install dependencies
        run: |
          pip install d2lbook==1.0.0
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install .

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin pandoc

      - name: Configure build
        run: |
          sed -i 's/eval_notebook = True/eval_notebook = False/' config.ini

      # Following the original d2l.ai build pipeline (build_html.sh)
      - name: Build
        run: |
          rm -rf _build/rst _build/html
          d2lbook build rst --tab pytorch
          if [ -f static/frontpage/frontpage.html ]; then
            cp static/frontpage/frontpage.html _build/rst/
          fi
          d2lbook build html --tab pytorch
          if [ -d static/frontpage/_images ]; then
            cp -r static/frontpage/_images/* _build/html/_images/
          fi
          # Optimize SVGs
          for fn in $(find _build/html/_images/ -iname '*.svg' 2>/dev/null); do
            if [[ $fn == *'qr_'* ]]; then continue; fi
            rsvg-convert -z 1 -f svg -o tmp.svg "$fn" && mv tmp.svg "$fn"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
