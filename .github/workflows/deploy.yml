name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS assets
        run: |
          git lfs pull --include="static/d2l-jp.pdf"
          if [ ! -f static/d2l-jp.pdf ]; then
            echo "Error: static/d2l-jp.pdf does not exist."
            exit 1
          fi
          # A real PDF starts with %PDF; an LFS pointer is a small text file
          if head -c 4 static/d2l-jp.pdf | grep -q '%PDF'; then
            echo "OK: static/d2l-jp.pdf is a valid PDF ($(stat -c%s static/d2l-jp.pdf) bytes)"
          else
            echo "Error: static/d2l-jp.pdf is not a valid PDF (likely still an LFS pointer)."
            head -c 200 static/d2l-jp.pdf
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: setup.py

      # d2lbook==1.0.0 matches the original d2l-ai Docker images
      - name: Install dependencies
        run: |
          pip install d2lbook==1.0.0
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install .
          # Pin compatible versions for sphinx bibtex support
          pip install sphinxcontrib-bibtex==2.5.0 pybtex==0.24.0
          # SEO extensions + jQuery (Sphinx 5.x dropped bundled jQuery)
          pip install sphinx-sitemap sphinxext-opengraph sphinxcontrib-jquery

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin pandoc webp

      - name: Cache Sphinx Build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-sphinx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-sphinx-

      - name: Configure build
        run: |
          sed -i 's/eval_notebook = True/eval_notebook = False/' config.ini

      # Pre-populate d2lbook's eval cache with stub ipynb files for all tabs.
      # d2lbook uses per-tab eval directories:
      #   pytorch (default) → _build/eval/
      #   others → _build/eval_<tab>/
      - name: Generate eval cache (all tabs)
        run: |
          python3 .github/workflow_scripts/generate_eval_cache.py pytorch
          python3 .github/workflow_scripts/generate_eval_cache.py mxnet
          python3 .github/workflow_scripts/generate_eval_cache.py jax
          python3 .github/workflow_scripts/generate_eval_cache.py tensorflow

      # Merge pre-executed outputs from d2l-en release into eval caches.
      # Downloads d2l-en-1.0.3.zip and copies execution outputs (plots, tables,
      # training curves) for all tabs. Code cells are identical between EN and JP.
      - name: Merge notebook outputs from d2l-en (all tabs)
        run: python3 .github/workflow_scripts/merge_en_outputs.py _build/eval pytorch mxnet jax tensorflow

      # Merge per-tab notebooks into the default eval dir with tab UI.
      # Injects Material Design tab selectors so readers can switch frameworks.
      - name: Merge framework tabs
        run: python3 .github/workflow_scripts/merge_tabs.py _build/eval pytorch mxnet jax tensorflow

      - name: Build RST
        run: d2lbook build rst --tab pytorch

      # Inject SEO settings into conf.py after d2lbook generates it
      - name: Inject SEO config
        run: |
          cat >> _build/rst/conf.py << 'SEOEOF'

          # --- SEO Configuration ---
          language = 'ja'
          html_title = 'ディープラーニングを深く学ぶ'
          html_short_title = 'D2L 日本語版'

          # jQuery (Sphinx 5.x dropped bundled jQuery)
          extensions.append('sphinxcontrib.jquery')

          # Sitemap generation
          extensions.append('sphinx_sitemap')
          html_baseurl = 'https://d2l-jp.me/'
          sitemap_locales = [None]
          sitemap_url_scheme = '{link}'

          # Open Graph meta tags
          extensions.append('sphinxext.opengraph')
          ogp_site_url = 'https://d2l-jp.me/'
          ogp_site_name = 'D2L 日本語版 - ディープラーニングを深く学ぶ'
          ogp_image = 'https://d2l-jp.me/_images/front-cup.jpg'
          ogp_type = 'book'
          ogp_custom_meta_tags = [
              '<meta property="og:locale" content="ja_JP" />',
          ]

          # Meta description and keywords
          html_meta = {
              'description': 'ディープラーニングを深く学ぶ - コード、数式、議論を通じたインタラクティブな深層学習の日本語教科書。PyTorch対応。500以上の大学で採用。',
              'keywords': '深層学習, ディープラーニング, deep learning, PyTorch, 機械学習, AI, 人工知能, 日本語, 教科書',
          }

          # Use lighter MathJax bundle: tex-chtml.js drops the unused MathML
          # input parser (~70 KiB savings). Sphinx only generates TeX notation.
          mathjax_path = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js'
          SEOEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' _build/rst/conf.py

      # Fix chapter toctrees: pandoc mangles toctree directives when
      # converting ipynb markdown cells to RST (options and entries
      # get collapsed onto single lines).
      - name: Fix chapter toctrees
        run: python3 .github/workflow_scripts/fix_chapter_toctrees.py

      # Fix references RST: d2lbook's ipynb→rst conversion mangles the
      # bibliography directive. Regenerate with proper RST formatting.
      - name: Fix references page
        run: |
          cat > _build/rst/chapter_references/zreferences.rst << 'REFEOF'

          参考文献
          ==========

          .. bibliography:: ../d2l.bib
          REFEOF
          sed -i 's/^          //' _build/rst/chapter_references/zreferences.rst

      # Fix index.rst: d2lbook's ipynb→rst conversion mangles RST directives
      # (toctree, raw::html) because they go through markdown→ipynb→rst.
      # Regenerate index.rst directly with proper RST formatting.
      - name: Fix index page
        run: |
          cat > _build/rst/index.rst << 'INDEXEOF'
          ディープラーニングを深く学ぶ
          ========================

          .. raw:: html
             :file: frontpage.html

          .. toctree::
             :maxdepth: 1

             chapter_preface/index
             chapter_installation/index
             chapter_notation/index

          .. toctree::
             :maxdepth: 2
             :numbered:

             chapter_introduction/index
             chapter_preliminaries/index
             chapter_linear-regression/index
             chapter_linear-classification/index
             chapter_multilayer-perceptrons/index
             chapter_builders-guide/index
             chapter_convolutional-neural-networks/index
             chapter_convolutional-modern/index
             chapter_recurrent-neural-networks/index
             chapter_recurrent-modern/index
             chapter_attention-mechanisms-and-transformers/index
             chapter_optimization/index
             chapter_computational-performance/index
             chapter_computer-vision/index
             chapter_natural-language-processing-pretraining/index
             chapter_natural-language-processing-applications/index
             chapter_reinforcement-learning/index
             chapter_gaussian-processes/index
             chapter_hyperparameter-optimization/index
             chapter_generative-adversarial-networks/index
             chapter_recommender-systems/index
             chapter_appendix-mathematics-for-deep-learning/index
             chapter_appendix-tools-for-deep-learning/index

          .. toctree::
             :maxdepth: 1

             chapter_references/zreferences
          INDEXEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' _build/rst/index.rst

      - name: Copy frontpage
        run: |
          if [ -f static/frontpage/frontpage.html ]; then
            cp static/frontpage/frontpage.html _build/rst/
          fi

      # Use sphinx-build directly instead of d2lbook build html.
      # d2lbook's html() always calls colab(), which crashes on stub notebooks.
      - name: Build HTML
        run: sphinx-build _build/rst _build/html -b html -c _build/rst

      - name: Post-process
        run: |
          # Minify CSS/JS in parallel
          npm install -g clean-css-cli terser
          find _build/html/_static -name '*.css' -print0 | xargs -0 -P 4 -I {} cleancss -o {} {}
          find _build/html/_static -name '*.js' -print0 | xargs -0 -P 4 -I {} terser {} -o {} -c -m

          # Copy CNAME for custom domain
          if [ -f CNAME ]; then
            cp CNAME _build/html/
          fi
          # Copy robots.txt
          if [ -f static/robots.txt ]; then
            cp static/robots.txt _build/html/
          fi
          if [ -d static/frontpage/_images ]; then
            mkdir -p _build/html/_images
            cp -r static/frontpage/_images/* _build/html/_images/ 2>/dev/null || true
          fi
          for fn in $(find _build/html/_images/ -iname '*.svg' 2>/dev/null); do
            if [[ $fn == *'qr_'* ]]; then continue; fi
            rsvg-convert -z 1 -f svg -o tmp.svg "$fn" && mv tmp.svg "$fn"
          done

          # Convert images to WebP in parallel
          find _build/html/ -type f \( -iname "*.jpg" -o -iname "*.png" -o -iname "*.jpeg" \) -print0 | xargs -0 -P 4 -I {} bash -c 'cwebp -quiet -q 80 "$1" -o "${1%.*}.webp" || true' _ {}
          # Package built Jupyter notebooks as downloadable zip
          cd _build/eval && zip -r ../../_build/html/d2l-jp.zip . -x '.*' && cd ../..
          # Copy PDF to deploy output for self-hosting
          if [ -f static/d2l-jp.pdf ]; then
            cp static/d2l-jp.pdf _build/html/
          fi

          # Inject Google Analytics (gtag.js) — placed at end of <head> to avoid
          # blocking critical CSS/resource hints that come first.
          find _build/html -name '*.html' -exec sed -i 's|</head>|<!-- Google tag (gtag.js) -->\n<script async src="https://www.googletagmanager.com/gtag/js?id=G-X354G2ERZT"></script>\n<script>\n  window.dataLayer = window.dataLayer || [];\n  function gtag(){dataLayer.push(arguments);}\n  gtag('\''js'\'', new Date());\n  gtag('\''config'\'', '\''G-X354G2ERZT'\'');\n</script>\n</head>|' {} \;

          # Inject per-page hreflang tags for multilingual SEO
          python3 .github/workflow_scripts/inject_hreflang.py

          # Inject per-page SEO tags (canonical URLs, meta descriptions, clean titles)
          python3 .github/workflow_scripts/inject_seo_tags.py

          # Page speed optimizations (lazy loading, defer JS, resource hints, async fonts)
          python3 .github/workflow_scripts/optimize_pagespeed.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
