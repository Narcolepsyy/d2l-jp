name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # d2lbook==1.0.0 matches the original d2l-ai Docker images
      - name: Install dependencies
        run: |
          pip install d2lbook==1.0.0
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install .
          # Pin compatible versions for sphinx bibtex support
          pip install sphinxcontrib-bibtex==2.5.0 pybtex==0.24.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin pandoc

      - name: Configure build
        run: |
          sed -i 's/eval_notebook = True/eval_notebook = False/' config.ini

      # Pre-populate d2lbook's eval cache with stub ipynb files.
      # d2lbook skips md→ipynb conversion when _build/eval/ already has files.
      - name: Generate eval cache
        run: python3 .github/workflow_scripts/generate_eval_cache.py

      - name: Build RST
        run: d2lbook build rst --tab pytorch

      - name: Copy frontpage
        run: |
          if [ -f static/frontpage/frontpage.html ]; then
            cp static/frontpage/frontpage.html _build/rst/
          fi

      # Use sphinx-build directly instead of d2lbook build html.
      # d2lbook's html() always calls colab(), which crashes on stub notebooks.
      - name: Build HTML
        run: sphinx-build _build/rst _build/html -b html -c _build/rst

      - name: Post-process
        run: |
          # Copy CNAME for custom domain
          if [ -f CNAME ]; then
            cp CNAME _build/html/
          fi
          if [ -d static/frontpage/_images ]; then
            mkdir -p _build/html/_images
            cp -r static/frontpage/_images/* _build/html/_images/ 2>/dev/null || true
          fi
          for fn in $(find _build/html/_images/ -iname '*.svg' 2>/dev/null); do
            if [[ $fn == *'qr_'* ]]; then continue; fi
            rsvg-convert -z 1 -f svg -o tmp.svg "$fn" && mv tmp.svg "$fn"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
