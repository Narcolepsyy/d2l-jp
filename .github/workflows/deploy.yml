name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install d2lbook==1.0.3
          pip install .
          # Pin compatible versions for sphinx bibtex support
          pip install sphinxcontrib-bibtex==2.5.0 pybtex==0.24.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin pandoc

      # Disable notebook evaluation since we don't have GPU/frameworks in CI.
      - name: Configure build
        run: |
          sed -i 's/eval_notebook = True/eval_notebook = False/' config.ini

      # Monkey-patch d2lbook to handle legacy {.python .input} code fences.
      # The assertion in split_markdown_cell crashes on this old pandoc format.
      - name: Patch d2lbook
        run: |
          SITE_PACKAGES=$(python3 -c "import site; print(site.getsitepackages()[0])")
          NOTEBOOK_PY="$SITE_PACKAGES/d2lbook/notebook.py"
          # Replace the strict assertion with a lenient check
          sed -i "s/assert tab.startswith('\`') and tab.endswith('\`'), tab/if not (tab.startswith('\`') and tab.endswith('\`')): tab = '\`python\`'/" "$NOTEBOOK_PY"

      # Build using d2lbook with single tab
      - name: Build RST
        run: d2lbook build rst --tab pytorch

      - name: Copy frontpage
        run: |
          if [ -f static/frontpage/frontpage.html ]; then
            cp static/frontpage/frontpage.html _build/rst/
          fi

      # Run sphinx-build directly instead of d2lbook build html
      # (d2lbook html() always calls colab() → eval() which crashes)
      - name: Build HTML
        run: |
          sphinx-build _build/rst _build/html -b html -c _build/rst

      - name: Post-process
        run: |
          # Copy frontpage images
          if [ -d static/frontpage/_images ]; then
            mkdir -p _build/html/_images
            cp -r static/frontpage/_images/* _build/html/_images/
          fi
          # Optimize SVGs
          for fn in $(find _build/html/_images/ -iname '*.svg' 2>/dev/null); do
            if [[ $fn == *'qr_'* ]]; then
              continue
            fi
            rsvg-convert -z 1 -f svg -o tmp.svg "$fn" && mv tmp.svg "$fn"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
