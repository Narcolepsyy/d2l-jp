name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # d2lbook==1.0.0 matches the original d2l-ai Docker images
      - name: Install dependencies
        run: |
          pip install d2lbook==1.0.0
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install .
          # Pin compatible versions for sphinx bibtex support
          pip install sphinxcontrib-bibtex==2.5.0 pybtex==0.24.0
          # SEO extensions + jQuery (Sphinx 5.x dropped bundled jQuery)
          pip install sphinx-sitemap sphinxext-opengraph sphinxcontrib-jquery

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin pandoc

      - name: Configure build
        run: |
          sed -i 's/eval_notebook = True/eval_notebook = False/' config.ini

      # Pre-populate d2lbook's eval cache with stub ipynb files.
      # d2lbook skips md→ipynb conversion when _build/eval/ already has files.
      - name: Generate eval cache
        run: python3 .github/workflow_scripts/generate_eval_cache.py pytorch

      - name: Build RST
        run: d2lbook build rst --tab pytorch

      # Inject SEO settings into conf.py after d2lbook generates it
      - name: Inject SEO config
        run: |
          cat >> _build/rst/conf.py << 'SEOEOF'

          # --- SEO Configuration ---
          language = 'ja'

          # jQuery (Sphinx 5.x dropped bundled jQuery)
          extensions.append('sphinxcontrib.jquery')

          # Sitemap generation
          extensions.append('sphinx_sitemap')
          html_baseurl = 'https://d2l-jp.me/'
          sitemap_locales = ['ja']

          # Open Graph meta tags
          extensions.append('sphinxext.opengraph')
          ogp_site_url = 'https://d2l-jp.me/'
          ogp_site_name = 'D2L 日本語版 - ディープラーニングを深く学ぶ'
          ogp_image = 'https://d2l-jp.me/_images/front-cup.jpg'
          ogp_type = 'book'
          ogp_custom_meta_tags = [
              '<meta property="og:locale" content="ja_JP" />',
          ]

          # Meta description and keywords
          html_meta = {
              'description': 'ディープラーニングを深く学ぶ - コード、数式、議論を通じたインタラクティブな深層学習の日本語教科書。PyTorch対応。500以上の大学で採用。',
              'keywords': '深層学習, ディープラーニング, deep learning, PyTorch, 機械学習, AI, 人工知能, 日本語, 教科書',
          }
          SEOEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' _build/rst/conf.py

      # Fix chapter toctrees: pandoc mangles toctree directives when
      # converting ipynb markdown cells to RST (options and entries
      # get collapsed onto single lines).
      - name: Fix chapter toctrees
        run: python3 .github/workflow_scripts/fix_chapter_toctrees.py

      # Fix index.rst: d2lbook's ipynb→rst conversion mangles RST directives
      # (toctree, raw::html) because they go through markdown→ipynb→rst.
      # Regenerate index.rst directly with proper RST formatting.
      - name: Fix index page
        run: |
          cat > _build/rst/index.rst << 'INDEXEOF'
          ディープラーニングを深く学ぶ
          ========================

          .. raw:: html
             :file: frontpage.html

          .. toctree::
             :maxdepth: 1

             chapter_preface/index
             chapter_installation/index
             chapter_notation/index

          .. toctree::
             :maxdepth: 2
             :numbered:

             chapter_introduction/index
             chapter_preliminaries/index
             chapter_linear-regression/index
             chapter_linear-classification/index
             chapter_multilayer-perceptrons/index
             chapter_builders-guide/index
             chapter_convolutional-neural-networks/index
             chapter_convolutional-modern/index
             chapter_recurrent-neural-networks/index
             chapter_recurrent-modern/index
             chapter_attention-mechanisms-and-transformers/index
             chapter_optimization/index
             chapter_computational-performance/index
             chapter_computer-vision/index
             chapter_natural-language-processing-pretraining/index
             chapter_natural-language-processing-applications/index
             chapter_reinforcement-learning/index
             chapter_gaussian-processes/index
             chapter_hyperparameter-optimization/index
             chapter_generative-adversarial-networks/index
             chapter_recommender-systems/index
             chapter_appendix-mathematics-for-deep-learning/index
             chapter_appendix-tools-for-deep-learning/index

          .. toctree::
             :maxdepth: 1

             chapter_references/zreferences
          INDEXEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' _build/rst/index.rst

      - name: Copy frontpage
        run: |
          if [ -f static/frontpage/frontpage.html ]; then
            cp static/frontpage/frontpage.html _build/rst/
          fi

      # Use sphinx-build directly instead of d2lbook build html.
      # d2lbook's html() always calls colab(), which crashes on stub notebooks.
      - name: Build HTML
        run: sphinx-build _build/rst _build/html -b html -c _build/rst

      - name: Post-process
        run: |
          # Copy CNAME for custom domain
          if [ -f CNAME ]; then
            cp CNAME _build/html/
          fi
          # Copy robots.txt
          if [ -f static/robots.txt ]; then
            cp static/robots.txt _build/html/
          fi
          if [ -d static/frontpage/_images ]; then
            mkdir -p _build/html/_images
            cp -r static/frontpage/_images/* _build/html/_images/ 2>/dev/null || true
          fi
          for fn in $(find _build/html/_images/ -iname '*.svg' 2>/dev/null); do
            if [[ $fn == *'qr_'* ]]; then continue; fi
            rsvg-convert -z 1 -f svg -o tmp.svg "$fn" && mv tmp.svg "$fn"
          done
          # Package built Jupyter notebooks as downloadable zip
          cd _build/eval && zip -r ../../_build/html/d2l-jp.zip . -x '.*' && cd ../..

          # Inject hreflang tags for multilingual SEO
          find _build/html -name '*.html' -exec sed -i 's|</head>|<link rel="alternate" hreflang="ja" href="https://d2l-jp.me/" />\n<link rel="alternate" hreflang="en" href="https://d2l.ai/" />\n<link rel="alternate" hreflang="zh" href="https://zh.d2l.ai/" />\n<link rel="alternate" hreflang="x-default" href="https://d2l.ai/" />\n</head>|' {} \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
